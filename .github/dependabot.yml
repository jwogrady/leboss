version: 2
updates:
  # Slidev presentation portal dependencies
  - package-ecosystem: npm
    directory: /presentations/slidev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used by CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
